<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Главная - приложение для спорта</title>
    <link rel="stylesheet" href="/css/mobile_styles.css">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
</head>
<body>
<nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="index">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Главная</span>
    </a>
    <a href="profile.html" class="nav-item" data-page="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Профиль</span>
    </a>
    <a href="training_plan.html" class="nav-item" data-page="plan">
        <span class="nav-icon">📅</span>
        <span class="nav-label">План</span>
    </a>
    <a href="training.html" class="nav-item" data-page="training">
        <span class="nav-icon">💪</span>
        <span class="nav-label">Тренировка</span>
    </a>
    <a href="progress.html" class="nav-item" data-page="progress">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Прогресс</span>
    </a>
</nav>

    <main class="main-content">
        <div class="welcome-section">
            <h1>Привет, <span id="username">Спортсмен</span>!</h1>
            <p>Готов к тренировке?</p>
        </div>

        <div class="next-workout-card">
            <h3>Следующая тренировка</h3>
            <div class="workout-info">
                <span class="workout-name">Тренировка груди + трицепс</span>
                <span class="workout-time">Сегодня, 18:00</span>
            </div>
            <button class="action-btn" id="start-workout-btn">Перейти к тренировке</button>
        </div>

        <div class="stats-preview">
            <div class="stat-card">
                <span class="stat-value">3</span>
                <span class="stat-label">Тренировок на этой неделе</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">1240</span>
                <span class="stat-label">Сожжено ккал</span>
            </div>
        </div>

        <div class="quick-links">
            <a href="training_plan.html" class="quick-link">
                <span class="quick-icon">📋</span>
                <span>План тренировок</span>
            </a>
            <a href="progress.html" class="quick-link">
                <span class="quick-icon">📈</span>
                <span>Мой прогресс</span>
            </a>
            <a href="profile.html" class="quick-link">
                <span class="quick-icon">⚙️</span>
                <span>Настройки профиля</span>
            </a>
        </div>
    </main>

    <script type="module">
    import { isAuthenticated, getUser, redirectIfNotAuthenticated } from '/js/auth.js';

    if (!isAuthenticated()) {
        window.location.href = '/login.html';
    } else {
        const user = getUser();
        if (user && user.name) {
            document.getElementById('username').textContent = user.name;
        } else {
            // можно запросить профиль через API, но пока оставим так
        }
    }
</script>
    <script src="/js/navigation.js"></script>
    <script type="module" src="/js/index.js"></script>
</body>
</html>
