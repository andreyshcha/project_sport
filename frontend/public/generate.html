    <h1 class="main_header">Составить план тренировок</h1>

            <!-- Сообщения будут появляться здесь динамически -->

                </div>
            </div>
        </div>
        <div class="chat-input-area">
            <textarea id="user-input" rows="2" placeholder="Напишите сообщение..."></textarea>
            <button id="send-btn">Отправить</button>
        </div>
    </div>
