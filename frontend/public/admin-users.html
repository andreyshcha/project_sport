<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями | Админ</title>
    <link rel="stylesheet" href="/css/mobile_styles.css">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
</head>
<body class="admin-page">
    <nav class="bottom-nav">
        <!-- ... тот же nav ... -->
    </nav>
    <h1 class="main_header">Управление пользователями</h1>

    <div class="admin-section">
        <div class="admin-header">
            <a href="admin.html" class="back-link">← Назад в админ-панель</a>
        </div>
        <div id="users-container" class="users-list"></div>
        
    </div>

    <!-- Модальное окно для редактирования пользователя -->
    <div id="user-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Редактировать пользователя</h3>
            <form id="user-form">
                <input type="hidden" id="user-id">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="user-name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="user-email" readonly disabled>
                </div>
                <div class="form-group">
                    <label>Роль</label>
                    <select id="user-role">
                        <option value="user">Пользователь</option>
                        <option value="admin">Администратор</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Пол</label>
                    <select id="user-gender">
                        
                        <option value="male">Мужской</option>
                        <option value="female">Женский</option>
                        
                    </select>
                </div>
                <div class="form-group">
                    <label>Рост (см)</label>
                    <input type="number" id="user-height" step="1">
                </div>
                <div class="form-group">
                    <label>Вес (кг)</label>
                    <input type="number" id="user-weight" step="0.1">
                </div>
                <div class="form-group">
                    <label>Возраст</label>
                    <input type="number" id="user-age" step="1">
                </div>
                <div class="form-group">
                    <label>Цель</label>
                    <select id="user-goal">
                        <option value="">Не указана</option>
                        <option value="weight_loss">Похудение</option>
                        <option value="muscle_gain">Набор массы</option>
                        <option value="maintenance">Поддержание</option>
                        <option value="endurance">Выносливость</option>
                        <option value="rehabilitation">Реабилитация</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Уровень</label>
                    <select id="user-level">
                        <option value="">Не указан</option>
                        <option value="beginner">Новичок</option>
                        <option value="intermediate">Средний</option>
                        <option value="advanced">Продвинутый</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Сбросить пароль</label>
                    <input type="password" id="new-password" placeholder="Новый пароль">
                    <button type="button" id="reset-password-btn" class="small-btn">Сбросить пароль</button>
                </div>
                <button type="submit" class="btn-save">Сохранить изменения</button>
                <button type="button" id="close-modal" class="btn-close">Отмена</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { getUser } from '/js/auth.js';
        const user = getUser();
        if (!user || user.role !== 'admin') {
            window.location.href = '/login.html';
        }
    </script>
    <script type="module" src="/js/admin-users.js"></script>
    <script src="/js/navigation.js"></script>
</body>
</html>
