        <h1 class="main_header">Регистрация</h1>
    <div class="auth-container">
        <form id="register-form" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Повторите пароль</label>
                <input type="password" id="confirm-password" required>
            </div>
            <div class="legal-links">
                <span>Регистрируясь, вы соглашаетесь с </span>
                <a href="/terms.html" target="_blank">условиями использования</a>,
                <a href="/privacy.html" target="_blank">политикой конфиденциальности</a>
                <span> и </span>
                <a href="/cookies.html" target="_blank">политикой обработки cookies</a>.
            </div>
            <div class="form-group checkbox">
                <label>
                    <input type="checkbox" id="consent" required>
                    Я ознакомлен(а) и согласен(а) с указанными документами
                </label>
            </div>
            <button type="submit">Зарегистрироваться</button>
            <div class="auth-switch">
                Уже есть аккаунт? <a href="/login.html">Войти</a>
            </div>
        </form>
    </div>

    <script type="module">
        import { register } from '/js/auth.js';

        const form = document.getElementById('register-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const consent = document.getElementById('consent').checked;

            if (password !== confirm) {
                alert('Пароли не совпадают');
                return;
            }
            if (!consent) {
                alert('Необходимо согласие с условиями');
                return;
            }

            try {
                await register(email, password, email.split('@')[0]); // имя из email
                alert('Регистрация успешна. Теперь войдите.');
                window.location.href = '/login.html';
            } catch (err) {
                alert(err.message);
            }
        });
    </script>

        <script src="/js/navigation.js"></script>
    </body>
</html>
